version: '3.8'

services:
  app:
    build: .
    container_name: email-notification-service
    ports:
      - "8085:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - EMAIL_FROM=noreply@example.com
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - email-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: email-postgres
    environment:
      - POSTGRES_DB=email_service
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - email-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d email_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: email-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - email-network
    restart: unless-stopped

networks:
  email-network:
    driver: bridge

volumes:
  postgres_data:
